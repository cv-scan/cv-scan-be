name: Deploy to Railway

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── CI: typecheck + lint ───────────────────────────────────────
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  # ─── Deploy: Railway auto-deploys on push to main ──────────────
  # Railway is connected directly to GitHub repo.
  # No extra deploy step needed here — Railway handles it.
  # This workflow only runs CI checks before Railway picks up the push.
